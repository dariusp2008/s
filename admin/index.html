<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Sign In | NicheChems</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#33502F">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='9' fill='%233B5FCC'/%3E%3Cpath d='M13 6h6v6.6l4.6 9.9a2 2 0 0 1-1.8 2.9H10.2a2 2 0 0 1-1.8-2.9L13 12.6V6z' fill='none' stroke='%23FAF9F6' stroke-width='1.7' stroke-linejoin='round' stroke-linecap='round'/%3E%3Cpath d='M11 19h10' stroke='%23A9C9A0' stroke-width='1.7' stroke-linecap='round'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">

<!--
  Internal tool, not a marketing page — no top bar / public nav / footer
  columns here on purpose. Authorization model: signing in only proves
  *who* someone is (Supabase Auth); being allowed to manage the catalogue
  is a separate check against the admin_users allowlist (see
  supabase/schema.sql), done via the is_admin() RPC below because RLS
  blocks any direct client read of admin_users itself.
-->

<style>
:root {
  --color-bg:          #FAF9F6;
  --color-surface:     #FFFFFF;
  --color-border:      #E4E1D8;
  --color-border-cool: #DCE3DE;

  --color-blue:        #3B5FCC;
  --color-blue-dark:   #2A459E;
  --color-blue-tint:   #EDF2FD;

  --color-sage:        #93AC8B;
  --color-moss:        #5C7A52;
  --color-forest:      #33502F;
  --color-green-tint:  #EEF3EA;

  --color-error:       #C0503D;

  --color-ink:         #202722;
  --color-ink-soft:    #545E56;
  --color-ink-faint:   #7C877F;
  --color-on-blue:     #FBFBF8;

  --font-serif: "Fraunces", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
  --font-sans:  "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

  --text-xs:   0.8125rem;
  --text-sm:   0.9375rem;
  --text-md:   1.1875rem;
  --text-xl:   clamp(1.75rem, 1.5rem + 1vw, 2.25rem);

  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.5rem; --space-6: 2rem; --space-7: 2.5rem; --space-8: 3.25rem;

  --radius-sm: 2px; --radius-md: 3px; --radius-lg: 4px;
  --radius-blob: 62% 38% 55% 45% / 48% 45% 55% 52%;
  --radius-pill: 4px;

  --shadow-md: 0 4px 14px -8px rgba(32, 39, 34, 0.14), 0 2px 5px -3px rgba(32, 39, 34, 0.08);
  --shadow-blue: 0 6px 16px -8px rgba(59, 95, 204, 0.32);

  --ease-organic: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-soft:    cubic-bezier(0.4, 0, 0.2, 1);
  --duration-fast: 180ms;
  --duration-base: 340ms;
}

*, *::before, *::after { box-sizing: border-box; }
* { margin: 0; }
body {
  min-height: 100vh;
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  line-height: 1.6;
  color: var(--color-ink);
  background: var(--color-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-6) var(--space-5);
  position: relative;
  overflow-x: hidden;
}

h1, h2 { font-family: var(--font-serif); font-weight: 500; color: var(--color-forest); }
a { color: inherit; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
input { font: inherit; }

a:focus-visible, button:focus-visible, input:focus-visible {
  outline: 2.5px solid var(--color-blue); outline-offset: 3px; border-radius: var(--radius-sm);
}

.c-logo {
  position: relative; z-index: 1;
  display: inline-flex; align-items: center; gap: var(--space-2);
  font-family: var(--font-serif); font-size: 1.35rem; font-weight: 600;
  color: var(--color-forest); text-decoration: none; margin-bottom: var(--space-7);
}
.c-logo__mark {
  display: grid; place-items: center; width: 60px; height: 60px;
  border-radius: var(--radius-md); background: var(--color-blue); color: var(--color-on-blue);
  overflow: hidden;
}
.c-logo__mark img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 50%; transform: scale(2.3); transform-origin: 50% 34%; }
.c-logo__word-alt { color: var(--color-blue); }

.c-admin-card {
  position: relative; z-index: 1; width: 100%; max-width: 26rem;
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
  padding: var(--space-7) var(--space-6);
}
.c-admin-card__eyebrow {
  display: inline-flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--color-moss); margin-bottom: var(--space-3);
}
.c-admin-card__eyebrow::before { content: ""; width: 18px; height: 2px; background: var(--color-moss); border-radius: var(--radius-pill); }
.c-admin-card h1 { font-size: var(--text-xl); margin-bottom: var(--space-2); }
.c-admin-card__sub { color: var(--color-ink-soft); margin-bottom: var(--space-6); }

.c-form-field { margin-bottom: var(--space-5); }
.c-form-field label { display: block; font-size: var(--text-xs); font-weight: 700; color: var(--color-forest); margin-bottom: var(--space-2); }
.c-form-field input {
  width: 100%; padding: 0.8rem var(--space-4); border-radius: var(--radius-sm);
  border: 1.5px solid var(--color-border-cool); background: var(--color-bg);
  font-size: var(--text-sm); color: var(--color-ink); transition: border-color var(--duration-fast) var(--ease-soft);
}
.c-form-field input:focus { border-color: var(--color-blue); }
.c-form-field input[aria-invalid="true"] { border-color: var(--color-error); }
.c-form-field-error { min-height: 1.1em; font-size: var(--text-xs); color: var(--color-error); margin-top: var(--space-2); }

.c-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
  width: 100%; padding: 0.85rem 1.5rem; border-radius: var(--radius-md);
  font-size: var(--text-sm); font-weight: 600;
  transition: transform var(--duration-base) var(--ease-organic), box-shadow var(--duration-base) var(--ease-organic),
              background-color var(--duration-fast) var(--ease-soft), opacity var(--duration-fast) var(--ease-soft);
}
.c-btn--primary { background: var(--color-blue); color: var(--color-on-blue); box-shadow: var(--shadow-blue); }
.c-btn--primary:hover { background: var(--color-blue-dark); transform: translateY(-1px); }
.c-btn--primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.c-btn--link { width: auto; padding: 0.4rem 0; color: var(--color-blue); font-weight: 600; text-decoration: underline; text-underline-offset: 2px; }

.c-admin-card__status {
  min-height: 1.2em; font-size: var(--text-xs); margin-top: var(--space-5); text-align: center;
}
.c-admin-card__status.is-error { color: var(--color-error); font-weight: 600; }
.c-admin-card__status.is-success { color: var(--color-moss); font-weight: 600; }

.c-admin-card__toggle { margin-top: var(--space-6); padding-top: var(--space-5); border-top: 1px solid var(--color-border); text-align: center; font-size: var(--text-xs); color: var(--color-ink-soft); }

.c-back-link {
  position: relative; z-index: 1; margin-top: var(--space-6);
  font-size: var(--text-xs); color: var(--color-ink-faint); text-decoration: none;
}
.c-back-link:hover { color: var(--color-blue); }

[hidden] { display: none !important; }
</style>
</head>
<body>

<a class="c-logo" href="../index.html">
  <span class="c-logo__mark" aria-hidden="true">
    <img src="../assets/logo.png" alt="" width="36" height="36" loading="eager">
  </span>
  Niche<span class="c-logo__word-alt">Chems</span>
</a>

<main class="c-admin-card">
  <span class="c-admin-card__eyebrow">Administrator Access</span>
  <h1 id="card-title">Sign in to the dashboard</h1>
  <p class="c-admin-card__sub" id="card-sub">Catalogue management is restricted to authorized NicheChems staff.</p>

  <form id="signin-form">
    <div class="c-form-field">
      <label for="signin-email">Email address</label>
      <input type="email" id="signin-email" name="email" autocomplete="username" required aria-describedby="signin-email-error">
      <p class="c-form-field-error" id="signin-email-error" role="alert"></p>
    </div>
    <div class="c-form-field">
      <label for="signin-password">Password</label>
      <input type="password" id="signin-password" name="password" autocomplete="current-password" required aria-describedby="signin-password-error">
      <p class="c-form-field-error" id="signin-password-error" role="alert"></p>
    </div>
    <button type="submit" class="c-btn c-btn--primary" id="signin-submit">Sign In</button>
  </form>

  <form id="signup-form" hidden>
    <div class="c-form-field">
      <label for="signup-email">Email address</label>
      <input type="email" id="signup-email" name="email" autocomplete="username" required aria-describedby="signup-email-error">
      <p class="c-form-field-error" id="signup-email-error" role="alert"></p>
    </div>
    <div class="c-form-field">
      <label for="signup-password">Password</label>
      <input type="password" id="signup-password" name="password" autocomplete="new-password" minlength="8" required aria-describedby="signup-password-error">
      <p class="c-form-field-error" id="signup-password-error" role="alert">Must be at least 8 characters.</p>
    </div>
    <button type="submit" class="c-btn c-btn--primary" id="signup-submit">Create Account</button>
  </form>

  <p class="c-admin-card__status" id="status" role="status" aria-live="polite"></p>

  <div class="c-admin-card__toggle">
    <span id="toggle-to-signup-wrap">First time here? <button type="button" class="c-btn--link" id="toggle-to-signup">Create an account</button></span>
    <span id="toggle-to-signin-wrap" hidden>Already have an account? <button type="button" class="c-btn--link" id="toggle-to-signin">Sign in</button></span>
  </div>
</main>

<a class="c-back-link" href="../index.html">&larr; Back to NicheChems</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script>
(function () {
  "use strict";

  var client = window.supabaseClient;
  var statusEl = document.getElementById("status");
  var cardTitle = document.getElementById("card-title");
  var cardSub = document.getElementById("card-sub");

  var signinForm = document.getElementById("signin-form");
  var signupForm = document.getElementById("signup-form");
  var toggleToSignupWrap = document.getElementById("toggle-to-signup-wrap");
  var toggleToSigninWrap = document.getElementById("toggle-to-signin-wrap");

  if (!client) {
    statusEl.textContent = "Can't reach the authentication service right now. Check your connection and reload.";
    statusEl.classList.add("is-error");
    signinForm.querySelector("button").disabled = true;
    return;
  }

  document.getElementById("toggle-to-signup").addEventListener("click", function () {
    signinForm.hidden = true;
    signupForm.hidden = false;
    toggleToSignupWrap.hidden = true;
    toggleToSigninWrap.hidden = false;
    cardTitle.textContent = "Create an admin account";
    cardSub.textContent = "New accounts still need to be approved before they can manage the catalogue — see below.";
    statusEl.textContent = "";
    statusEl.className = "c-admin-card__status";
  });
  document.getElementById("toggle-to-signin").addEventListener("click", function () {
    signupForm.hidden = true;
    signinForm.hidden = false;
    toggleToSigninWrap.hidden = true;
    toggleToSignupWrap.hidden = false;
    cardTitle.textContent = "Sign in to the dashboard";
    cardSub.textContent = "Catalogue management is restricted to authorized NicheChems staff.";
    statusEl.textContent = "";
    statusEl.className = "c-admin-card__status";
  });

  var EMAIL_PATTERN = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function bindField(input, validate) {
    var errorEl = document.getElementById(input.id + "-error");
    function check() {
      var message = validate(input.value);
      input.setAttribute("aria-invalid", message ? "true" : "false");
      if (errorEl) errorEl.textContent = message || "";
      return !message;
    }
    input.addEventListener("blur", check);
    input.addEventListener("input", function () {
      if (input.getAttribute("aria-invalid") === "true") check();
    });
    return check;
  }
  function emailValidator(value) {
    if (!value.trim()) return "Email address is required.";
    return EMAIL_PATTERN.test(value.trim()) ? "" : "Enter a valid email address.";
  }

  /** Checks the admin_users allowlist via the is_admin() RPC (direct
   *  table access is blocked by RLS — see supabase/schema.sql). */
  async function currentUserIsAdmin() {
    var sessionResult = await client.auth.getSession();
    var user = sessionResult.data && sessionResult.data.session && sessionResult.data.session.user;
    if (!user) return false;
    var rpcResult = await client.rpc("is_admin", { uid: user.id });
    if (rpcResult.error) {
      console.error("Admin check failed:", rpcResult.error);
      return false;
    }
    return rpcResult.data === true;
  }

  async function redirectIfAlreadyAdmin() {
    var isAdmin = await currentUserIsAdmin();
    if (isAdmin) window.location.href = "dashboard/index.html";
  }
  redirectIfAlreadyAdmin();

  // -- Sign in ----------------------------------------------------------
  var signinEmail = document.getElementById("signin-email");
  var signinPassword = document.getElementById("signin-password");
  var signinSubmit = document.getElementById("signin-submit");
  var checkSigninEmail = bindField(signinEmail, emailValidator);
  var checkSigninPassword = bindField(signinPassword, function (v) { return v ? "" : "Password is required."; });

  signinForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    if (!checkSigninEmail() || !checkSigninPassword()) return;

    signinSubmit.disabled = true;
    statusEl.textContent = "Signing in…";
    statusEl.className = "c-admin-card__status";

    var result = await client.auth.signInWithPassword({
      email: signinEmail.value.trim(),
      password: signinPassword.value
    });

    if (result.error) {
      signinSubmit.disabled = false;
      statusEl.textContent = result.error.message || "Sign-in failed. Check your email and password.";
      statusEl.className = "c-admin-card__status is-error";
      return;
    }

    var isAdmin = await currentUserIsAdmin();
    if (!isAdmin) {
      await client.auth.signOut();
      signinSubmit.disabled = false;
      statusEl.textContent = "This account isn't authorized for admin access. Contact a site owner to be added.";
      statusEl.className = "c-admin-card__status is-error";
      return;
    }

    statusEl.textContent = "Signed in — redirecting…";
    statusEl.className = "c-admin-card__status is-success";
    window.location.href = "dashboard/index.html";
  });

  // -- Create account (bootstrap path — still needs manual admin_users
  // approval, see supabase/schema.sql's ADMIN BOOTSTRAP section) --------
  var signupEmail = document.getElementById("signup-email");
  var signupPassword = document.getElementById("signup-password");
  var signupSubmit = document.getElementById("signup-submit");
  var checkSignupEmail = bindField(signupEmail, emailValidator);
  var checkSignupPassword = bindField(signupPassword, function (v) {
    if (!v) return "Password is required.";
    return v.length >= 8 ? "" : "Must be at least 8 characters.";
  });

  signupForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    if (!checkSignupEmail() || !checkSignupPassword()) return;

    signupSubmit.disabled = true;
    statusEl.textContent = "Creating account…";
    statusEl.className = "c-admin-card__status";

    var result = await client.auth.signUp({
      email: signupEmail.value.trim(),
      password: signupPassword.value
    });

    signupSubmit.disabled = false;

    if (result.error) {
      statusEl.textContent = result.error.message || "Couldn't create that account.";
      statusEl.className = "c-admin-card__status is-error";
      return;
    }

    statusEl.textContent = "Account created. Ask a site owner to add you to admin_users in Supabase before you can access the dashboard.";
    statusEl.className = "c-admin-card__status is-success";
    signupForm.reset();
  });
})();
</script>
</body>
</html>
